scalability:{title:'Sr Manager, Sales and Marketing',company:'Scalability Experts',dates:'2011 – 2014',summary:'Directly managed inside sales team and led Marketing function. Drove evangelization efforts and relationship development with partners like Microsoft, HP and Cisco through both direct contact and by designing sales toolkits and sales plays for national sales team. Created and administered sales and operational training programs. Designed and implemented all of the organization’s marketing strategies and tactics. Launched integrated campaigns that included a wide array of marketing vehicles, including SEO, PPC, physical and virtual events, sales plays and toolkits, content creation and syndication, PR, co-marketing, e-mail nurture and social media. Successfully created engagement with both partners and prospects, and produced sales-ready opportunities and marketing originated revenue.',metrics:['Increased marketing generated sales by 21% in 2012 and 88% in 2013 YOY.','2012 Above and Beyond Award Winner','2012 Promoted to Marketing Manager','2013 Promoted to Manager, Sales & Marketing','2014 Promoted to Sr. Manager, Sales & Marketing'],logo:'logo-scalability.jpg',awards:['Increased marketing generated sales by 21% in 2012 and 88% in 2013 YOY.','2012 Above and Beyond Award Winner','2012 Promoted to Marketing Manager','2013 Promoted to Manager, Sales & Marketing','2014 Promoted to Sr. Manager, Sales & Marketing'],quotes:['“John\'s efforts have directly influenced $2M+ in new revenue.” — Rick Toma','“He envisioned a solution, and then most uniquely, brought his vision into reality.” — Rick Toma, Executive VP, Business Development']},

spireon:{title:'Sr Manager, Channel Marketing',company:'Spireon',dates:'2017 – 2019',summary:'Created the Spireon Channel Marketing program which supports three product lines, six distinct partner channels, and over 500 partners. Led direct resources and worked across departments to implement new programs. Improved partner enablement and engagement by implementing regular partner communications, overhauling partner sales and marketing tools, and introducing channel friendly programs and policies.',metrics:['Architected new brand strategy for fleet products','Developed tools to support partner sales and marketing efforts','Designed and launched Market Development Funds program','Deployed new Partner Relationship Management tool','Launched partner deal registration','Increased prospective partner leads by 5800% in 2018','Oversaw creation of Sprint.Spireon.com partner site','2017 and 2018 Employee Spotlight Award Winner'],logo:'logo-spireon.jpg',awards:['Architected new brand strategy for fleet products','Developed tools to support partner sales and marketing efforts','Designed and launched Market Development Funds program','Deployed new Partner Relationship Management tool','Launched partner deal registration','Increased prospective partner leads by 5800% in 2018','Oversaw creation of Sprint.Spireon.com partner site','2017 and 2018 Employee Spotlight Award Winner'],quotes:['“John has been absolutely instrumental to the success of our Agent Program.” — Mark Van Dyke, Partner Channel Professional','“Humble, hard-working, and always focused on uniting people in order to move the needle.” — Summer Reyes, Channel Marketing']},

founder:{title:'Founder & CEO',company:'ROICalcMagic · SnapCall.live · ServiceProMagic',dates:'2025 – Present',summary:'Founded three AI-powered B2B SaaS ventures serving B2B sales teams, hospitality operators, and local service businesses. Led each from concept through product build, launch, and early customer adoption, owning the complete 0-to-1 company build across product strategy, AI architecture, UX/workflow design, commercial positioning, web/funnel development, monetization model, infrastructure, and go-to-market execution. Leveraged AI to create an unfair business advantage spanning product development, customer acquisition, and operational scale.',metrics:['Onboarded first 7 customers across the portfolio.','Recruited and managed early 1099 sales, technical, and operating talent to support customer acquisition and AI integrations.','Built and commercialized live SaaS products with working infrastructure, customer workflows, demos, websites, payment/subscription foundations, and sales motions.'],ventures:[['ServiceProMagic','logo-servicepromagic.jpg','https://ServiceProMagic.com','A strategic website and funnel platform for home service businesses. Unlike template builders, it researches the business, scans top competitors, identifies positioning gaps, and builds market-specific headlines, CTAs, trust signals, conversion copy, and page elements engineered to make the phone ring.',['Acquired first two customers']],['SnapCall','logo-snapcall.jpg','https://SnapCall.live','AI phone-answering infrastructure for restaurants and service businesses, designed to answer calls, take orders, answer common questions, and recover revenue that would otherwise be lost to missed calls.',['Acquired first three customers','Hired and trained two sellers','Contracted offshore developer resources','Leveraged Retell and Make.com to deploy AI voice agents','Developed tablet application to route phone orders to the kitchen']],['ROICalcMagic','logo-roicalcmagic.jpg','https://ROICalcMagic.com','Enterprise ROI calculator platform for value selling, helping B2B SaaS teams turn financial impact into interactive business cases that support stronger sales conversations.',['Acquired first five customers','Leveraged vibe coding, and later OpenClaw, to create a self-service model for near-instant custom ROI calculators','Built outbound marketing engine targeting key decision-makers at early-stage SaaS companies']]],logo:'logo-servicepromagic.jpg',logos:['logo-servicepromagic.jpg','logo-snapcall.jpg','logo-roicalcmagic.jpg'],awards:['Onboarded first 7 customers across the portfolio.','Recruited and managed early 1099 sales, technical, and operating talent to support customer acquisition and AI integrations.','Built and commercialized live SaaS products with working infrastructure, customer workflows, demos, websites, payment/subscription foundations, and sales motions.'],quotes:['This chapter positions John as an executive who can evaluate, build, and operationalize AI rather than simply talk about it.']}

const els={title:document.getElementById('spotTitle'),company:document.getElementById('spotCompany'),dates:document.getElementById('spotDates'),summary:document.getElementById('spotSummary'),metrics:document.getElementById('spotMetrics'),quote:document.getElementById('spotQuote'),awards:document.getElementById('spotAwards'),logo:document.getElementById('spotLogo'),ventures:document.getElementById('ventureGrid'),spot:document.getElementById('spotlight'),connector:document.getElementById('connector')};function positionSpot(node,key){const screen=document.querySelector('.timelineScreen').getBoundingClientRect(),n=node.getBoundingClientRect();els.spot.classList.toggle('founderSpot',key==='founder');let left=Math.max(24,Math.min(n.left-screen.left,screen.width-els.spot.offsetWidth-24));if(key==='founder')left=24;els.spot.style.setProperty('--spot-left',left+'px');els.connector.style.left=(n.left-screen.left+n.width/2)+'px';els.connector.style.display='block'}function render(key){const r=roles[key],node=document.querySelector(`.node[data-role="${key}"]`);document.querySelectorAll('.node').forEach(n=>n.classList.toggle('active',n.dataset.role===key));els.title.textContent=r.title;if(r.logos&&key==='founder'){els.company.innerHTML='<span>'+r.company+'</span><span class="inlineLogos">'+r.logos.map(src=>`<img src="${src}" alt="">`).join('')+'</span>'}else{els.company.textContent=r.company}els.dates.textContent=r.dates;els.summary.textContent=r.summary;document.getElementById('aiTourBtn').style.display=key==='founder'?'inline-flex':'none';els.metrics.innerHTML=(r.metrics||[]).map(m=>`<span class="metric">${m}</span>`).join('');document.querySelector('.recommendation').style.display=r.noSide?'none':'flex';els.quote.innerHTML=(r.quotes||[r.quote]||[]).map(q=>`<p>${q}</p>`).join('');els.awards.innerHTML=(r.awards||[]).map(a=>`<li>${a}</li>`).join('');els.ventures.innerHTML=(r.ventures||[]).map(v=>`<section><div class="ventureTitle"><img src="${v[1]}" alt=""><h3>${v[0]}</h3></div><p>${v[3]}</p><div class="ventureAccomplishments"><b>Results & accomplishments</b><ul>${(v[4]||[]).map(item=>`<li>${item}</li>`).join('')}</ul></div><a href="${v[2]}" target="_blank" rel="noopener">Visit site ↗</a></section>`).join('');if(r.logos){els.logo.className='logoStack';els.logo.innerHTML=r.logos.map(src=>`<img src="${src}" alt="">`).join('');els.logo.style.display='flex'}else if(r.logo){els.logo.className='spotLogoWrap';els.logo.innerHTML=`<img class="spotLogo" src="${r.logo}" alt="">`;els.logo.style.display='inline-flex'}else{els.logo.innerHTML='';els.logo.style.display='none'}requestAnimationFrame(()=>positionSpot(node,key))}document.querySelectorAll('.node').forEach(n=>n.onclick=()=>render(n.dataset.role));window.addEventListener('resize',()=>{const active=document.querySelector('.node.active');if(active)positionSpot(active,active.dataset.role)});render('scalability');
