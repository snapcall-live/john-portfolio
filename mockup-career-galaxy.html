<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>John Midtbo — Career Galaxy Mockup</title><style>
:root{--bg:#080b18;--ink:#f8fafc;--muted:#a8b3cf;--line:rgba(255,255,255,.13);--blue:#60a5fa;--gold:#f7c46c;--green:#59d49b;--violet:#a78bfa;--card:rgba(13,20,39,.78)}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 50% 45%,#172554 0,#0f172a 38%,#050816 80%);color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;overflow:hidden}body:before{content:"";position:fixed;inset:0;background-image:radial-gradient(#fff 1px,transparent 1px),radial-gradient(#fff 1px,transparent 1px);background-size:90px 90px,140px 140px;background-position:0 0,35px 55px;opacity:.12;pointer-events:none}.app{height:100vh;display:grid;grid-template-columns:minmax(620px,1.1fr) minmax(360px,.9fr);gap:22px;padding:26px}.stage{position:relative;border:1px solid var(--line);border-radius:34px;background:rgba(255,255,255,.035);box-shadow:0 30px 90px rgba(0,0,0,.35);overflow:hidden}.topbar{position:absolute;z-index:5;left:24px;right:24px;top:20px;display:flex;justify-content:space-between;gap:18px;align-items:center}.brand{font-weight:950;letter-spacing:-.04em;font-size:26px}.hint{color:var(--muted);font-size:13px;font-weight:750}.galaxy{position:absolute;inset:80px 20px 20px}.orbit{position:absolute;left:50%;top:50%;border:1px dashed rgba(255,255,255,.14);border-radius:50%;transform:translate(-50%,-50%)}.o1{width:390px;height:390px}.o2{width:560px;height:560px}.core{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:190px;height:190px;border-radius:50%;border:1px solid rgba(255,255,255,.2);background:radial-gradient(circle at 35% 30%,#fff,#bfdbfe 20%,#1d4ed8 62%,#0b1223);display:grid;place-items:center;text-align:center;box-shadow:0 0 80px rgba(96,165,250,.38);padding:20px}.core b{font-size:24px;letter-spacing:-.04em}.core span{display:block;color:#dbeafe;font-size:12px;margin-top:8px}.node{position:absolute;width:148px;min-height:104px;border:1px solid var(--line);border-radius:22px;background:linear-gradient(145deg,rgba(255,255,255,.16),rgba(255,255,255,.055));backdrop-filter:blur(16px);color:var(--ink);padding:14px;cursor:pointer;text-align:left;box-shadow:0 20px 50px rgba(0,0,0,.28);transition:.22s transform,.22s border,.22s box-shadow}.node:hover,.node.active{transform:translateY(-5px) scale(1.04);border-color:var(--gold);box-shadow:0 0 0 1px rgba(247,196,108,.2),0 22px 80px rgba(247,196,108,.18)}.node h3{margin:0;font-size:15px;line-height:1.05}.node p{margin:9px 0 0;color:var(--muted);font-size:12px;line-height:1.3}.node i{display:block;width:28px;height:4px;border-radius:999px;margin-bottom:12px}.n1{left:50%;top:2%;transform:translateX(-50%)}.n2{right:8%;top:22%}.n3{right:10%;bottom:16%}.n4{left:50%;bottom:1%;transform:translateX(-50%)}.n5{left:8%;bottom:16%}.n6{left:8%;top:22%}.panel{border:1px solid var(--line);border-radius:34px;background:var(--card);backdrop-filter:blur(18px);padding:26px;display:flex;flex-direction:column;min-height:0;box-shadow:0 30px 90px rgba(0,0,0,.25)}.eyebrow{color:var(--gold);font-size:12px;text-transform:uppercase;letter-spacing:.16em;font-weight:950}.panel h1{font-size:clamp(34px,4vw,56px);line-height:.94;letter-spacing:-.06em;margin:10px 0 16px}.panel h2{font-size:28px;letter-spacing:-.04em;margin:4px 0 10px}.lead{color:#dbeafe;font-size:17px;line-height:1.45}.proof{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0}.metric{border:1px solid var(--line);border-radius:18px;background:rgba(255,255,255,.06);padding:14px}.metric b{font-size:23px;color:#fff}.metric span{display:block;color:var(--muted);font-size:12px;margin-top:5px}.quote{margin-top:auto;border-left:4px solid var(--gold);padding:16px;background:rgba(247,196,108,.09);border-radius:0 18px 18px 0;color:#fff}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}.tab{border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.06);color:var(--ink);padding:9px 12px;font-weight:850;cursor:pointer}.tab.active{background:var(--gold);color:#171108;border-color:var(--gold)}.contact{position:absolute;left:24px;bottom:20px;color:var(--muted);font-size:13px}.mini{color:var(--muted);font-size:13px;line-height:1.45}@media(max-width:980px){body{overflow:auto}.app{height:auto;grid-template-columns:1fr}.stage{height:680px}.panel{min-height:560px}.galaxy{transform:scale(.82)}}
</style></head><body><main class="app"><section class="stage"><div class="topbar"><div><div class="brand">John Midtbo</div><div class="hint">Interactive Career Galaxy mockup</div></div><div class="hint">Hover or click a node → drill into proof</div></div><div class="galaxy"><div class="orbit o1"></div><div class="orbit o2"></div><div class="core"><div><b>GTM Growth Leader</b><span>Revenue · Partnerships · AI · Leadership</span></div></div><button class="node n1 active" data-key="revenue"><i style="background:var(--gold)"></i><h3>Revenue Transformation</h3><p>Bookings, ASP, retention, pipeline.</p></button><button class="node n2" data-key="partners"><i style="background:var(--green)"></i><h3>Partner Ecosystems</h3><p>Scale channel programs globally.</p></button><button class="node n3" data-key="ai"><i style="background:var(--violet)"></i><h3>AI Superpowers</h3><p>Practical tools, not buzzwords.</p></button><button class="node n4" data-key="leadership"><i style="background:var(--blue)"></i><h3>Leadership</h3><p>Teams, culture, operating rhythm.</p></button><button class="node n5" data-key="proof"><i style="background:#fb7185"></i><h3>Third-Party Proof</h3><p>Recommendations and validation.</p></button><button class="node n6" data-key="career"><i style="background:#38bdf8"></i><h3>Career Arc</h3><p>Roles, scope, markets, customers.</p></button></div><div class="contact">john@midtbo.com · linkedin.com/in/johnmidtbo · (214) 971-2611</div></section><aside class="panel"><div class="eyebrow">Selected node</div><h1 id="title"></h1><p class="lead" id="lead"></p><div class="proof" id="metrics"></div><h2 id="subhead"></h2><p class="mini" id="detail"></p><div class="tabs" id="tabs"></div><div class="quote" id="quote"></div></aside></main><script>
const data={revenue:{title:'Revenue Transformation',lead:'A visual proof hub for the outcomes hiring teams care about first: growth, conversion, retention, pipeline, and deal size.',metrics:[['+254%','H1 2025 new bookings YoY at airSlate'],['+350%','Average selling price expansion'],['+352%','Partner-generated ARR YoY at Creatio'],['42% → 61%','Channel revenue contribution shift']],subhead:'Interaction idea',detail:'Click the revenue node and the galaxy zooms inward. Each metric becomes a clickable evidence chip: role context, what changed, and supporting recommendation.',quote:'“He exponentially increased partner sourced pipeline and partner-sold new bookings. He is a proven builder, strategist, and leader.” — Ergun Ekici'},partners:{title:'Partner Ecosystems',lead:'A drill-down experience showing how John builds partner programs, enablement systems, and global channel motions.',metrics:[['500+','new partners acquired at airSlate'],['75','new Creatio partners onboarded'],['140','Omnitracs partners managed'],['500+','Spireon partners supported']],subhead:'Interaction idea',detail:'Partner nodes split into Acquire, Enable, Activate, Measure. Visitors can follow the lifecycle instead of scrolling through bullets.',quote:'“John has been absolutely instrumental to the success of our Agent Program... a deep understanding of Partner Channels.” — Mark Van Dyke'},ai:{title:'AI Superpowers',lead:'A modern section where AI work is presented as live venture proof: ROI tools, voice agents, service funnels, and media workflows.',metrics:[['ROICalcMagic','ROI / value-selling automation'],['SnapCall Live','AI voice infrastructure'],['ServiceProMagic','Website + ad funnel generation'],['RuneStone','AI-assisted content operations']],subhead:'Interaction idea',detail:'Each AI planet opens a demo-style card: problem, user, workflow, business value, and traction. This keeps AI credible and tactile.',quote:'Best use: position John as an executive who can also prototype the future of GTM.'},leadership:{title:'Leadership System',lead:'Shows John as a builder of teams and operating systems, not just an individual contributor with good metrics.',metrics:[['11-person','global airSlate channels team built'],['29-person','sales + marketing org led at Omnitracs'],['#1','employee engagement / satisfaction'],['Global','partner conferences + advisory boards']],subhead:'Interaction idea',detail:'A leadership node can reveal “how I operate”: talent, cadence, accountability, culture, executive communication, and cross-functional alignment.',quote:'“I can confidently say he is the best manager I’ve ever worked with.” — Lidiia Sobolenko'},proof:{title:'Third-Party Proof',lead:'Recommendations become context-aware evidence instead of a long wall of quotes.',metrics:[['8+','strong public recommendation themes'],['40-year','career comparison quote'],['Direct reports','validate management style'],['Executives','validate GTM results']],subhead:'Interaction idea',detail:'When viewing a node, only the most relevant quotes appear. Revenue quotes for revenue, leadership quotes for leadership, partner quotes for partners.',quote:'“I put John in the top five business people I’ve ever met across my 40-year career.” — Wes Parker'},career:{title:'Career Arc',lead:'A compact path from early quota-carrying roles to VP-level global partner leadership and AI venture building.',metrics:[['15,000+','Omnitracs customers reached'],['60','international markets'],['8','products commercialized'],['174%','quota attainment at TOPS']],subhead:'Interaction idea',detail:'The career node can switch to timeline mode, showing scope expansion over time without forcing a full-page resume scroll.',quote:'This node answers: “How did he build the muscles behind the headline?”'}};
const buttons=[...document.querySelectorAll('.node')],title=document.getElementById('title'),lead=document.getElementById('lead'),metrics=document.getElementById('metrics'),subhead=document.getElementById('subhead'),detail=document.getElementById('detail'),quote=document.getElementById('quote'),tabs=document.getElementById('tabs');function render(key){let d=data[key];buttons.forEach(b=>b.classList.toggle('active',b.dataset.key===key));title.textContent=d.title;lead.textContent=d.lead;metrics.innerHTML=d.metrics.map(m=>`<div class="metric"><b>${m[0]}</b><span>${m[1]}</span></div>`).join('');subhead.textContent=d.subhead;detail.textContent=d.detail;quote.textContent=d.quote;tabs.innerHTML=Object.entries(data).map(([k,v])=>`<button class="tab ${k===key?'active':''}" data-key="${k}">${v.title.split(' ')[0]}</button>`).join('');tabs.querySelectorAll('button').forEach(b=>b.onclick=()=>render(b.dataset.key))}buttons.forEach(b=>{b.onclick=()=>render(b.dataset.key);b.onmouseenter=()=>render(b.dataset.key)});render('revenue');
</script></body></html>
