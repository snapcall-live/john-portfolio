          source: "Karen Miles Fezzey - Colleague",
        },
        {
          quote:
            "John is a major catalyst of growth... helped lay the foundation for future growth by developing and successfully launching our Database-as-a-Service solution.",
          source: "Christopher Cadieux - Practice Manager",
        },
        {
          quote:
            "John's efforts have directly influenced $2M+ in new revenue... He has demonstrated an ability to identify and understand a broad scope of business challenges.",
          source: "Rick Toma - EVP, Business Development",
        },
        {
          quote:
            "John quickly became my go-to person for channel-related questions and my guide for navigating internal bureaucracies and challenging personalities.",
          source: "Matt Benson - Business Strategist",
        },
      ];
      let activeStrengthRecommendation = 0;
      let strengthRecommendationTimer;
      function renderRecommendation(index, manual = false) {
        activeStrengthRecommendation =
          (index + recommendations.length) % recommendations.length;
        const rec = recommendations[activeStrengthRecommendation];
        els.recQuote.textContent = `“${rec.quote}”`;
        els.recSource.textContent = rec.source;
        els.recCount.textContent = `${activeStrengthRecommendation + 1} / ${recommendations.length}`;
        if (manual) restartStrengthRecommendationTimer();
      }
      function restartStrengthRecommendationTimer() {
        window.clearInterval(strengthRecommendationTimer);
        strengthRecommendationTimer = window.setInterval(
          () => renderRecommendation(activeStrengthRecommendation + 1),
          7500,
        );
      }
      function render(key) {
        const e = evidence[key];
        document
          .querySelectorAll(".strength")
          .forEach((s) => s.classList.toggle("active", s.dataset.key === key));
        els.title.textContent = e.title;
        els.summary.textContent = e.summary;
        els.ach.innerHTML = e.achievements.map((x) => `<li>${x}</li>`).join("");
        els.proof.innerHTML = e.proof.map((x) => `<li>${x}</li>`).join("");
      }
      document.querySelectorAll(".strength").forEach((s) => {
        s.onmouseenter = () => render(s.dataset.key);
        s.onclick = () => render(s.dataset.key);
      });
      document.getElementById("strengthRecPrev").onclick = () =>
        renderRecommendation(activeStrengthRecommendation - 1, true);
      document.getElementById("strengthRecNext").onclick = () =>
        renderRecommendation(activeStrengthRecommendation + 1, true);
      render("channel");
      renderRecommendation(0);
      restartStrengthRecommendationTimer();
    </script>
    <script src="confidential-unlock.js"></script>
  </body>
